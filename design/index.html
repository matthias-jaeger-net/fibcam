<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Camera UI</title>

        <style>
            :root {
                --bg: #2b2a2a;
                --fg: #ffffff;
                --accent: #d5ff17;

                --bg-interactive: #ffffff22;
                --bg-interactive-hover: #ffffff33;

                --border: 1px solid #ffffff55;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
            }

            body {
                display: flex;
                flex-direction: column;
                background: var(--bg);
                color: var(--fg);
                font-family: system-ui, sans-serif;
            }

            /* iOS reliability layer */
            button {
                -webkit-appearance: none;
                appearance: none;
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }

            /* prevent Safari hover/active bugs */
            @media (hover: none) and (pointer: coarse) {
                .btn:hover {
                    background: var(--bg-interactive);
                }
            }

            /* ===== Layout ===== */
            .bar {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 16px;
                padding: 16px;
            }

            .top-bar {
                justify-content: center;
            }

            .bottom-bar {
                justify-content: space-around;
            }

            .camera-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }

            .camera-placeholder {
                width: 100%;
                height: 100%;
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #ffffff66;
            }

            /* FLASH */
            .flash {
                position: absolute;
                inset: 0;
                background: var(--accent);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.12s ease;
                mix-blend-mode: screen;
                z-index: 10;
            }

            .flash.active {
                opacity: 0.9;
            }

            /* ===== Base buttons ===== */
            .btn,
            .shutter,
            .settings-item {
                -webkit-transform: translateZ(0);
                transform: translateZ(0);

                cursor: pointer;
                position: relative;
                transition: 0.15s ease;
                -webkit-appearance: none;
                appearance: none;
                -webkit-tap-highlight-color: transparent;
            }

            /* ICON BUTTONS */
            .btn {
                width: 42px;
                height: 42px;
                border-radius: 50%;
                border: var(--border);
                background: var(--bg-interactive);
                color: var(--fg);
            }

            .btn::before {
                content: "";
                position: absolute;
                inset: 0;
                margin: auto;
                width: 24px;
                height: 24px;
                background-color: currentColor;
                mask: var(--icon) center / contain no-repeat;
                -webkit-mask: var(--icon) center / contain no-repeat;
            }

            .btn:hover {
                background: var(--bg-interactive-hover);
            }

            /* iOS-safe pressed state (JS-controlled) */
            .pressed {
                transform: scale(0.95);
                background: var(--bg-interactive-hover);
                border-color: var(--accent);
                color: var(--accent);
            }

            /* fallback */
            .btn:active {
                transform: scale(0.95);
                border-color: var(--accent);
                color: var(--accent);
            }

            /* SHUTTER */
            .shutter {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                border: var(--border);
                background: var(--bg-interactive);
            }

            .shutter:active {
                background: var(--accent);
            }

            /* SETTINGS */
            .settings-wrapper {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .settings-panel {
                position: absolute;
                bottom: 90px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 12px;
                border: var(--border);
                border-radius: 999px;
                background: #1f1f1fdd;
                backdrop-filter: blur(10px);

                opacity: 0;
                transform: translateY(10px);
                pointer-events: none;
                transition: 0.2s ease;
            }

            .settings-panel.open {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            .settings-item {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: var(--border);
                background: var(--bg-interactive);
                color: var(--fg);
            }

            .settings-item::before {
                content: "";
                position: absolute;
                inset: 0;
                margin: auto;
                width: 22px;
                height: 22px;
                background-color: currentColor;
                mask: var(--icon) center / contain no-repeat;
                -webkit-mask: var(--icon) center / contain no-repeat;
            }

            .settings-item.active {
                color: var(--accent);
                border-color: var(--accent);
            }

            /* ICON MAPS */
            .increase-density {
                --icon: url("icons/plus(1).svg");
            }
            .decrease-density {
                --icon: url("icons/minus.svg");
            }
            .flip {
                --icon: url("icons/flip-vertical.svg");
            }
            .rotate {
                --icon: url("icons/rotate-clockwise.svg");
            }
            .settings {
                --icon: url("icons/settings.svg");
            }
            .switch-camera {
                --icon: url("icons/camera-rotate.svg");
            }

            .grid {
                --icon: url("icons/square-plus-2.svg");
            }
            .spiral {
                --icon: url("icons/spiral.svg");
            }
            .photo {
                --icon: url("icons/question-mark.svg");
            }
        </style>
    </head>

    <body>
        <!-- TOP -->
        <div class="bar top-bar">
            <button class="btn decrease-density" data-btn></button>
            <button class="btn increase-density" data-btn></button>
            <button class="btn flip" data-btn></button>
            <button class="btn rotate" data-btn></button>
        </div>

        <!-- CAMERA -->
        <div class="camera-container">
            <div class="camera-placeholder">Camera Preview</div>
            <div class="flash" id="flash"></div>
        </div>

        <!-- BOTTOM -->
        <div class="bar bottom-bar">
            <div class="settings-wrapper">
                <button class="btn settings" id="settingsBtn"></button>

                <div class="settings-panel" id="settingsPanel">
                    <button class="settings-item grid" data-toggle></button>
                    <button class="settings-item spiral" data-toggle></button>
                    <button class="settings-item photo" data-toggle></button>
                </div>
            </div>

            <button class="shutter" id="shutter"></button>
            <button class="btn switch-camera" data-btn></button>
        </div>

        <script>
            const flash = document.getElementById("flash");
            const shutter = document.getElementById("shutter");

            const settingsBtn = document.getElementById("settingsBtn");
            const panel = document.getElementById("settingsPanel");

            /* ===== unified press system (fixes iOS :active bugs) ===== */
            function press(el) {
                el.classList.add("pressed");
                setTimeout(() => el.classList.remove("pressed"), 120);
            }

            document.querySelectorAll("[data-btn]").forEach((btn) => {
                btn.addEventListener("touchstart", () => press(btn), {
                    passive: true,
                });
                btn.addEventListener("mousedown", () => press(btn));
            });

            /* ===== shutter flash ===== */
            function triggerFlash() {
                flash.classList.add("active");
                setTimeout(() => flash.classList.remove("active"), 140);
            }

            shutter.addEventListener("click", triggerFlash);
            shutter.addEventListener("touchstart", triggerFlash, {
                passive: true,
            });

            /* ===== settings panel ===== */
            settingsBtn.addEventListener("click", () => {
                settingsBtn.classList.toggle("pressed");
                panel.classList.toggle("open");
            });

            /* ===== toggle items ===== */
            document.querySelectorAll("[data-toggle]").forEach((el) => {
                el.addEventListener("click", () => {
                    el.classList.toggle("active");
                });
            });
        </script>
    </body>
</html>
