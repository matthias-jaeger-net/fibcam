<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Cam</title>

        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div id="camera-container">
            <div class="top-bar"></div>

            <div class="bottom-bar">
                <button id="shutter"></button>
            </div>
        </div>

        <div id="flash"></div>

        <!-- Overlay -->
        <div id="photo-overlay">
            <div class="overlay-controls">
                <a id="download" download="photo.png">
                    <img src="img/download.svg" />
                </a>
                <a id="close">
                    <img src="img/close.svg" />
                </a>
            </div>
            <img id="overlay-image" />
        </div>

        <!-- Fibonacci UI -->
        <div id="fib-message">place the centre of the fibonacci squares</div>
        <div id="fib-list-bar"></div>

        <div id="fib-controls-bar">
            <button id="switch-camera">
                <img src="img/switch-camera.svg" />
            </button>

            <button id="fib-minus">−</button>
            <button id="fib-plus">
                <img src="img/plus.svg" />
            </button>
            <button id="fib-spin">↻</button>
            <button id="fib-mirror">
                <img src="img/flip-horizontal-2.svg" />
            </button>

            <button id="fib-on-photo">overlay</button>

            <div id="fib-overlay-mode">
                <div id="overlay-modal">
                    <h3>Overlay Options</h3>

                    <label>
                        Squares
                        <input type="checkbox" id="toggle-squares" checked />
                    </label>

                    <label>
                        Spiral
                        <input type="checkbox" id="toggle-spiral" checked />
                    </label>
                </div>
            </div>
        </div>

        <button id="fib-shutter"></button>

        <script src="sketch.js"></script>
    </body>
</html>
