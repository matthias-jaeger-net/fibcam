<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Cam</title>
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div id="camera-container">
            <button id="fibonacci-squares">
                <img src="img/square.svg" alt="Fibonacci Squares" />
            </button>
            <div class="top-bar">
                <button id="gyro-toggle" title="Toggle Gyroscope Effects">
                    <img
                        src="img/separator-vertical.svg"
                        alt="Gyroscope Toggle"
                    />
                </button>
                <button id="settings">
                    <img src="img/settings.svg" alt="Settings" />
                </button>
                <button id="switch-camera">
                    <img src="img/switch-camera.svg" alt="Switch Camera" />
                </button>
            </div>
            <div class="bottom-bar">
                <button id="shutter"></button>
            </div>
        </div>

        <div id="flash"></div>

        <div id="photo-overlay">
            <div class="overlay-controls">
                <a id="download" download="photo.png">
                    <img src="img/download.svg" alt="Download" />
                </a>
                <a id="close">
                    <img src="img/close.svg" alt="Close" />
                </a>
            </div>
            <img id="overlay-image" />
        </div>

        <!-- Fibonacci UI Elements -->
        <div id="fib-message">place the centre of the fibonacci squares</div>
        <div id="fib-list-bar"></div>
        <div id="fib-controls-bar">
            <button id="fib-minus">−</button>
            <button id="fib-plus">
                <img src="img/plus.svg" alt="Increase" />
            </button>
            <button id="fib-spin">↻</button>
            <button id="fib-mirror">
                <img src="img/flip-horizontal-2.svg" alt="Mirror" />
            </button>
<button id="fib-fit">
                <img src="img/expand.svg" alt="Fit" />
            </button>
            <button id="fib-on-photo">overlay</button>
            <div id="fib-overlay-mode">
                <button class="fib-mode-btn active" data-mode="all">All</button>
                <button class="fib-mode-btn" data-mode="spiral">Spiral</button>
                <button class="fib-mode-btn" data-mode="squares">Squares</button>
            </div>
        </div>
        <button id="fib-shutter"></button>

        <script src="sketch.js"></script>
    </body>
</html>
